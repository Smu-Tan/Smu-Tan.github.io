github_users:
  - Smu-Tan

repo_description_lines_max: 2

github_repos:
  - repo: Smu-Tan/Remedy-R
    name: Remedy-R
    description: Generative reasoning for machine translation evaluation without error annotations.
    tags:
      - Machine Translation
      - Evaluation
      - Reasoning
  - repo: Smu-Tan/Remedy
    name: ReMedy
    description: Reward-modeling based machine translation evaluation from human preferences.
    tags:
      - Reward Modeling
      - MT Evaluation
      - Preferences
  - repo: Smu-Tan/Neuron-Specialization
    name: Neuron Specialization
    description: Code for analyzing intrinsic task modularity in multilingual machine translation models.
    tags:
      - Multilingual NLP
      - Model Analysis
      - MT
  - repo: Smu-Tan/ZS-NMT-Variations
    name: ZS-NMT Variations
    description: Experiments for understanding variations in zero-shot neural machine translation performance.
    tags:
      - Zero-Shot MT
      - NMT
      - Analysis
  - repo: Smu-Tan/meft_decoder_only
    name: MEFT Decoder Only
    description: Decoder-only implementation for memory-efficient fine-tuning with reversible model components.
    tags:
      - Fine-Tuning
      - Efficiency
      - Transformers
  - repo: Smu-Tan/Megatron-LM
    name: Attention Residuals for Megatron-LM
    description: Megatron-LM implementation of Full and Block Attention Residuals for dense Llama-style pretraining experiments.
    tags:
      - Attention Residuals
      - Megatron-LM
      - Triton

huggingface_artifacts:
  - name: EC40
    type: Dataset
    url: https://huggingface.co/datasets/ShaomuTan/EC40
    description: Hugging Face dataset release for multilingual and cross-cultural evaluation research.
    icon: fa-solid fa-database
    tags:
      - Dataset
      - Hugging Face
      - Evaluation
  - name: Remedy-R
    type: Model Collection
    url: https://huggingface.co/collections/ShaomuTan/remedy-r
    description: Model collection for generative reasoning in machine translation evaluation.
    icon: fa-solid fa-layer-group
    tags:
      - Models
