      - Reasoning
  - name: ReMedy
    type: Model Collection
    url: https://huggingface.co/collections/ShaomuTan/remedy
    description: Model collection for reward-modeling based machine translation evaluation.
    icon: fa-solid fa-layer-group
    tags:
